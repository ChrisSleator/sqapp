<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system/assets/styles/salesforce-lightning-design-system.min.css">
</head>
<body>
    <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-center slds-m-around_medium">
        <div class="slds-col slds-size_1-of-1">
            <div class="slds-notify slds-notify_alert slds-theme_error" role="alert">
                <span class="slds-assistive-text">Error</span>
                <h2 class="slds-text-heading_medium">Something went wrong!</h2>
                <div class="slds-notify__content">
                    <p>We’re sorry, but an error has occurred while processing your request. Please try again later or contact support if the issue persists.</p>
                </div>
            </div>
            <a class="slds-button slds-button_brand" href="/">Return to Home</a>
        </div>
    </div>
</body>
</html>
