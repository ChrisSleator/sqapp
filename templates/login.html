<!DOCTYPE html>
<html>
<head>
    <title>Salesforce SOQL Query App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .login-btn {
            background-color: #00a1de;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .login-btn:hover {
            background-color: #0091c4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SOQL Query Tool</h1>
        <p>Execute Salesforce SOQL queries and export results</p>
        <a href="/login" class="login-btn">Login with Salesforce</a>
    </div>
</body>
</html>
