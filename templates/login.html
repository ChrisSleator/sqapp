<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <link rel="stylesheet" href="https://stylesheet-url-for-salesforce-design-system.css">\n    <title>OAuth Login</title>\n</head>\n<body>\n    <div class="slds-brand-header slds-grid slds-grid_align-center">\n        <div class="slds-brand-header__content">\n            <h1 class="slds-text-heading_large">Login with Salesforce</h1>\n        </div>\n    </div>\n    <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-m-around_medium">\n        <form action="/oauth2/auth" method="GET" class="slds-form slds-form_stacked">\n            <label class="slds-form-element__label" for="username">Username</label>\n            <div class="slds-form-element">\n                <input type="text" id="username" name="username" class="slds-input" required>\n            </div>\n            <label class="slds-form-element__label" for="password">Password</label>\n            <div class="slds-form-element">\n                <input type="password" id="password" name="password" class="slds-input" required>\n            </div>\n            <button type="submit" class="slds-button slds-button_brand">Login</button>\n        </form>\n    </div>\n</body>\n</html>
